[project]
name = "agent-script-spec"
version = "0.1.0"
description = "Agent Script Specification Pydantic models"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["loguru>=0.7.3", "pydantic>=2.11.7"]

[build-system]
requires = ["uv_build>=0.8.4,<0.9.0"]
build-backend = "uv_build"

[project.scripts]
generate-schema = "agent_script_spec.generate:generate_schemas"
